<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Analyzer｜ふくさん専用ナレッジ復元版</title>
  <style>
    :root{
      --bg:#fbf7f4;--card:#fffdfb;--line:#e1d1c8;--text:#4f4646;--sub:#8a7b78;
      --pink:#c46a91;--purple:#8f73b8;--orange:#c98251;--green:#6a9b82;
      --grad:linear-gradient(135deg,#c56c93,#8f73b8);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:
      radial-gradient(circle at 8% 0%,rgba(255,243,235,.78),transparent 30%),
      radial-gradient(circle at 88% 8%,rgba(238,229,247,.74),transparent 31%),
      linear-gradient(135deg,#fbf7f4 0%,#faf6f8 48%,#fff9f3 100%);color:var(--text);min-height:100vh}
    header{position:sticky;top:0;background:rgba(255,250,247,.9);border-bottom:1px solid var(--line);padding:18px;z-index:10;backdrop-filter:blur(16px)}
    .wrap{max-width:1180px;margin:0 auto}
    h1{margin:0;color:#7b5d74;font-size:26px;letter-spacing:-.04em}
    h2{margin:0 0 14px;color:#7b5d74;font-size:18px}
    h3{margin:0 0 10px;color:#7b5d74;font-size:15px}
    .sub{font-size:13px;color:var(--sub);margin-top:6px;line-height:1.7}
    .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
    button{border:0;border-radius:999px;padding:11px 15px;font-weight:700;cursor:pointer;font-family:inherit}
    .tab{background:#f3ebe7;color:#78676b;border:1px solid transparent}
    .tab.active,.primary{background:var(--grad);color:#fff;box-shadow:0 12px 24px rgba(122,91,83,.14)}
    .ghost{background:#f3ebe7;color:#78676b;border:1px solid var(--line)}
    .danger{background:#fff0f3;color:#b15f72;border:1px solid #e7c5cc}
    main{max-width:1180px;margin:0 auto;padding:24px 18px 60px}
    .panel{display:none}.panel.active{display:block}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .card{background:rgba(255,253,251,.92);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 14px 38px rgba(128,98,91,.08);margin-bottom:16px}
    .stat{text-align:center;min-height:130px;display:flex;flex-direction:column;justify-content:center}
    .stat b{display:block;font-size:27px;color:var(--pink);margin-top:8px;line-height:1.2}
    .stat small{color:var(--sub);line-height:1.6;margin-top:6px}
    textarea,input,select{width:100%;box-sizing:border-box;border:1px solid #d8c7c1;border-radius:16px;padding:12px;font-family:inherit;font-size:15px;background:#fffaf7;color:var(--text)}
    textarea{min-height:130px;line-height:1.7}
    label{display:block;margin:10px 0 6px;color:var(--sub);font-weight:700;font-size:13px}
    .post{border-left:4px solid var(--pink);background:#fff;border-radius:18px;padding:14px;margin:12px 0;white-space:pre-wrap;line-height:1.75}
    .box{background:linear-gradient(135deg,rgba(255,248,244,.9),rgba(247,242,249,.9));border:1px solid var(--line);border-radius:18px;padding:15px;line-height:1.8;margin:10px 0}
    .badge{display:inline-block;background:#f8eff4;color:#9f6280;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;margin:3px}
    .bar{height:10px;background:#f0e7ed;border-radius:999px;overflow:hidden;margin:8px 0}
    .bar span{display:block;height:100%;background:var(--grad)}
    .copy{background:#3d3339;color:#fff;border-radius:20px;padding:18px;white-space:pre-wrap;line-height:1.85;margin:10px 0}
    .muted{color:var(--sub);font-size:13px;line-height:1.75}
    .mini{font-size:13px;line-height:1.7;color:var(--sub)}
    .pill{display:inline-block;border-radius:999px;background:#eef7f1;color:#5f9378;padding:6px 10px;font-size:12px;font-weight:700;margin:3px}
    @media(max-width:900px){.grid,.grid2,.grid3{grid-template-columns:1fr}h1{font-size:23px}}
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>✦ Threads Analyzer</h1>
    <div class="sub">ふくさん専用｜ボタンが押せる安定版に、発信ナレッジを戻した復元版</div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('dashboard',this)">📊 ダッシュボード</button>
      <button class="tab" onclick="showTab('input',this)">✍️ 投稿入力</button>
      <button class="tab" onclick="showTab('next',this)">🧭 次の一手</button>
      <button class="tab" onclick="showTab('drafts',this)">✨ 投稿生成</button>
      <button class="tab" onclick="showTab('knowledge',this)">🧠 ナレッジ</button>
      <button class="tab" onclick="showTab('funnel',this)">🪜 導線設計</button>
      <button class="tab" onclick="showTab('test',this)">✅ 動作確認</button>
    </div>
  </div>
</header>

<main>
  <section id="dashboard" class="panel active"></section>
  <section id="input" class="panel"></section>
  <section id="next" class="panel"></section>
  <section id="drafts" class="panel"></section>
  <section id="knowledge" class="panel"></section>
  <section id="funnel" class="panel"></section>
  <section id="test" class="panel">
    <div class="card">
      <h2>✅ 動作確認</h2>
      <p>このボタンを押してメッセージが出たら、JavaScriptは動いています。</p>
      <button class="primary" onclick="alert('動いてるよ！ここまでOK！')">テストボタン</button>
    </div>
  </section>
</main>

<script>
var KNOWLEDGE={
  position:"弁護士ではなく、調停離婚を経験した三姉妹の母。専門家として上から教えるのではなく、同じように悩むママへ損しない準備の道順を渡す先輩ママ。",
  target:"夫の顔色をうかがいながら、子ども・生活費・住まい・養育費・将来が怖くて離婚に動けない30〜40代ママ。",
  one:"夜、夫の足音や鍵の音で体が固まり、子どもの寝顔を見ながら『離婚したい。でもお金も住む場所も養育費も怖い』と検索している30〜40代のママ。",
  message:"今すぐ離婚しなくていい。でも、自分と子どもを守る材料は集めていい。",
  rule:"Threadsは感情的な驚き・共感で反応される場。noteは思考的な説得・納得で購入される場。",
  funnel:"見られる投稿＝認知、保存される投稿＝信頼、売れる投稿＝導線。バズと購入は別物として分析する。",
  roles:[
    ["認知","読者が『あ、これ私』と足を止める投稿。強い1行目・共感・情景描写が大事。"],
    ["信頼","保存される実務投稿。お金、証拠、調停、養育費、制度、準備の順番をやさしく整理。"],
    ["導線","売り込まず、脈絡を作ってプロフィール/noteへ橋を置く投稿。"],
    ["レビュー","売れた事実・読者の声・追記予告で安心感と人気感を作る投稿。"],
    ["制作過程","『最近相談が多いのでまとめています』など、必要だから作った流れを見せる投稿。"]
  ],
  hooks:[
    "離婚で損する人の9割が知らないことがあります。",
    "調停で損しない人と損する人の違い、ほとんどの人が知らない。",
    "証拠収集で絶対やってはいけないこと。",
    "離婚したい。でも怖い。でも損したくない人へ。",
    "夫の『ただいま』が怖い人へ。",
    "子どものために、まだ我慢してる？",
    "それ、お金の管理じゃなくて支配かもしれない。",
    "今すぐ離婚しなくていい。でも準備は始めていい。"
  ],
  pain:[
    "夫の帰宅音・足音・鍵の音で体が固まる",
    "生活費を握られ、10円単位で責められる",
    "子どもの前で母親を罵倒される",
    "外面が良く、被害を信じてもらえない",
    "離婚後の生活費・住まい・養育費が怖い",
    "証拠がないと思い込んで動けない",
    "父親を奪う罪悪感で決められない",
    "調停で夫が嘘をつくのが怖い",
    "夜にこっそり検索して、また朝になる"
  ],
  bridge:[
    "必要であれば、プロフィールのnoteにまとめています。",
    "今すぐ離婚を決めなくていいので、まず準備の順番だけ見てみてください。",
    "離婚するかどうかより先に、自分と子どもを守る材料を集めていい。",
    "ひとりで抱えなくていいように、私の経験をまとめました。",
    "怖くて動けない人ほど、まずは見える化からで大丈夫。"
  ],
  avoid:[
    "法律の断定をしすぎない",
    "読者を責める『覚悟がないだけ』系にしない",
    "傾聴投稿で強く売らない",
    "煽りすぎて読者を不安に置き去りにしない",
    "専門家のように上から教えない",
    "Threads本文だけで全部売ろうとしない"
  ]
};

var posts=[
{text:"離婚したいのに動けない理由って、愛情があるからじゃなくて、生活費と子どもの未来が怖いからなんだよね。",time:"21:00",likes:520,replies:88,reposts:64,views:26000,clicks:18,sales:1,type:"共感型",role:"共感",psyche:"お金が不安"},
{text:"離婚前に見るべきお金は4つ。貯金、生活費、学費、退職金と年金。ここを見ないまま動くと不安が増える。",time:"12:00",likes:310,replies:31,reposts:74,views:18500,clicks:29,sales:2,type:"数字型",role:"信頼",psyche:"お金が不安"},
{text:"夫のただいまが怖い人へ。あなたが弱いんじゃない。身体が危険を覚えてしまってるだけ。必要なら、誰にも気づかれず始める心の離婚準備をプロフィールに置いています。",time:"22:00",likes:740,replies:166,reposts:112,views:42000,clicks:56,sales:3,type:"共感型",role:"導線",psyche:"怖い"},
{text:"調停で一番大事なのは、うまく話すことじゃなくて、事実と数字を先に整理しておくこと。感情を責められた人ほど、準備が盾になる。",time:"15:00",likes:260,replies:24,reposts:58,views:15000,clicks:16,sales:1,type:"逆説型",role:"信頼",psyche:"調停が怖い"},
{text:"また1歩、動き出してくださった方がいました。私のnoteを選んでくれてありがとうございます。週末に、調停前チェックの追記をします。",time:"22:00",likes:190,replies:18,reposts:21,views:9200,clicks:42,sales:2,type:"ストーリー型",role:"レビュー",psyche:"今すぐ知りたい"}
];

function showTab(id,btn){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});
  if(btn)btn.classList.add('active');
}
function n(v){v=Number(v);return isFinite(v)?v:0}
function eg(p){return p.views?((n(p.likes)+n(p.replies)*3+n(p.reposts)*2)/n(p.views)*100):0}
function clickRate(p){return p.views?(n(p.clicks)/n(p.views)*100):0}
function salesRate(p){return p.clicks?(n(p.sales)/n(p.clicks)*100):0}
function funnel(p){
  var s=0,e=eg(p),cr=clickRate(p),sr=salesRate(p),t=p.text||"";
  if(e>=2)s+=18;else if(e>=1)s+=12;else if(e>.5)s+=7;
  if(cr>=.12)s+=22;else if(cr>=.06)s+=15;else if(cr>0)s+=8;
  if(sr>=5)s+=25;else if(sr>=2)s+=16;else if(sr>0)s+=9;
  if(["導線","販売","信頼","レビュー"].includes(p.role))s+=10;
  if(/プロフィール|note|準備|追記|まとめ|必要であれば/.test(t))s+=10;
  if(/怖い|動けない|子ども|生活費|養育費|調停|証拠|お金|離婚|モラハラ/.test(t))s+=7;
  return Math.min(100,s);
}
function esc(s){return String(s||"").replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function classify(t){
  var type="共感型",role="共感",psyche="怖い";
  if(/\d|4つ|ステップ|項目|選/.test(t))type="数字型";
  if(/知らないと損|絶対|今すぐ|注意|やってはいけない|9割/.test(t))type="情報緊急型";
  if(/診断|チェック|当てはまる|ひとつでも/.test(t))type="診断型";
  if(/じゃなくて|実は|一番大事|よりも/.test(t))type="逆説型";
  if(/私|あの日|また1歩|選んでくれて|経験|調停離婚/.test(t))type="ストーリー型";
  if(/プロフィール|note|まとめ|マガジン|リンク/.test(t))role="導線";
  else if(/売れ|購入|選んでくれて|ありがとう|追記|レビュー/.test(t))role="レビュー";
  else if(/調停|養育費|証拠|制度|お金|確認|財産分与|年金|生活費/.test(t))role="信頼";
  if(/お金|生活費|貯金|学費|養育費|家賃|年金|財産分与/.test(t))psyche="お金が不安";
  if(/子ども|子供|親権|転校|進学|学校/.test(t))psyche="子どもが不安";
  if(/証拠|録音|記録|日記|LINE/.test(t))psyche="証拠がない";
  if(/調停|裁判所|公正証書/.test(t))psyche="調停が怖い";
  if(/罪悪感|父親を奪う|我慢/.test(t))psyche="罪悪感";
  if(/今すぐ|知らないと損|絶対|注意/.test(t))psyche="今すぐ知りたい";
  if(/怖い|帰宅|ただいま|足音|鍵|心臓|動悸/.test(t))psyche="怖い";
  return {type:type,role:role,psyche:psyche};
}
function bestTime(){
  var map={};
  posts.forEach(function(p){
    var h=(p.time||"00:00").split(":")[0]+":00";
    if(!map[h])map[h]={h:h,count:0,score:0,clicks:0,sales:0};
    map[h].count++;map[h].score+=funnel(p);map[h].clicks+=n(p.clicks);map[h].sales+=n(p.sales);
  });
  var arr=Object.values(map).map(function(x){x.avg=Math.round(x.score/x.count);return x}).sort(function(a,b){return b.avg-a.avg});
  return arr[0]||{h:"データ待ち",avg:0,clicks:0,sales:0};
}
function badge(v){return '<span class="badge">'+esc(v)+'</span>'}
function bar(v){return '<div class="bar"><span style="width:'+Math.min(100,v)+'%"></span></div>'}
function stat(label,value,note,color){
  return '<div class="card stat"><span class="muted">'+esc(label)+'</span><b style="color:'+color+'">'+esc(value)+'</b><small>'+esc(note||"")+'</small></div>'
}
function renderDashboard(){
  var avg=posts.length?(posts.reduce(function(s,p){return s+eg(p)},0)/posts.length).toFixed(2):"0.00";
  var clicks=posts.reduce(function(s,p){return s+n(p.clicks)},0);
  var sales=posts.reduce(function(s,p){return s+n(p.sales)},0);
  var bt=bestTime();
  var sorted=posts.slice().sort(function(a,b){return funnel(b)-funnel(a)});
  document.getElementById("dashboard").innerHTML=
  '<div class="grid">'+
  stat("総投稿数",posts.length+"件","分析中の投稿数","#8f73b8")+
  stat("平均EG率",avg+"%","返信は重めに評価","#c46a91")+
  stat("勝ち時間",bt.h,"導線スコア平均 "+bt.avg+"点","#c98251")+
  stat("note成果",clicks+"クリック / "+sales+"部","購入まで見る","#6a9b82")+
  '</div>'+
  '<div class="grid2"><div class="card"><h2>🧠 ふく式・現在の診断</h2>'+
  '<div class="box"><b>忘れない軸</b><br>'+esc(KNOWLEDGE.message)+'</div>'+
  '<div class="box"><b>次に見ること</b><br>バズだけでなく、noteクリック・購入・プロフィール導線につながった投稿を優先して増やす。</div>'+
  '</div><div class="card"><h2>🕯️ 勝ち時間メモ</h2><p>今のところ <b>'+esc(bt.h)+'台</b> が強め。</p><p class="muted">投稿数が増えるほど、ふくさんだけのゴールデンタイムが見えます。</p></div></div>'+
  '<div class="card"><h2>導線スコアランキング</h2>'+
  sorted.map(function(p,i){var f=funnel(p);return '<div class="post"><div><b>#'+(i+1)+'</b> '+badge(p.type)+badge(p.role)+badge(p.psyche)+badge("導線 "+f+"点")+'</div>'+bar(f)+esc(p.text)+'<p class="mini">EG '+eg(p).toFixed(2)+'% / noteクリック率 '+clickRate(p).toFixed(2)+'% / note購入率 '+salesRate(p).toFixed(2)+'% / note '+p.clicks+'クリック・'+p.sales+'部</p></div>'}).join("")+
  '</div>';
}
function renderInput(){
  document.getElementById("input").innerHTML=
  '<div class="grid2"><div class="card"><h2>投稿を追加</h2>'+
  '<label>投稿本文</label><textarea id="newText" placeholder="投稿本文を入れる"></textarea>'+
  '<div class="grid2"><div><label>時間</label><input id="newTime" type="time" value="21:00"></div><div><label>閲覧数</label><input id="views" type="number" value="0"></div></div>'+
  '<div class="grid3"><div><label>いいね</label><input id="likes" type="number" value="0"></div><div><label>返信</label><input id="replies" type="number" value="0"></div><div><label>リポスト</label><input id="reposts" type="number" value="0"></div></div>'+
  '<div class="grid2"><div><label>noteクリック</label><input id="clicks" type="number" value="0"></div><div><label>note購入</label><input id="sales" type="number" value="0"></div></div>'+
  '<p><button class="primary" onclick="addPost()">追加する</button></p></div>'+
  '<div class="card"><h2>入力済み</h2><div id="postList"></div></div></div>';
  document.getElementById("postList").innerHTML=posts.map(function(p,i){return '<div class="post">'+badge(p.type)+badge(p.role)+badge(p.psyche)+'<br>'+esc(p.text)+'<p><button class="ghost" onclick="removePost('+i+')">削除</button></p></div>'}).join("");
}
function addPost(){
  var text=document.getElementById("newText").value.trim();
  if(!text){alert("投稿本文を入れてね");return}
  var c=classify(text);
  posts.unshift({text:text,time:document.getElementById("newTime").value,likes:n(document.getElementById("likes").value),replies:n(document.getElementById("replies").value),reposts:n(document.getElementById("reposts").value),views:n(document.getElementById("views").value),clicks:n(document.getElementById("clicks").value),sales:n(document.getElementById("sales").value),type:c.type,role:c.role,psyche:c.psyche});
  renderAll();showTab("input",document.querySelector('[onclick*="input"]'));
}
function removePost(i){posts.splice(i,1);renderAll();showTab("input",document.querySelector('[onclick*="input"]'))}
function recommend(){
  var guide=posts.filter(function(p){return p.role==="導線"}).length;
  var trust=posts.filter(function(p){return p.role==="信頼"}).length;
  var empathy=posts.filter(function(p){return p.role==="共感"}).length;
  var sales=posts.reduce(function(s,p){return s+n(p.sales)},0);
  if(empathy>=posts.length*.4 && trust<posts.length*.3)return {hook:"数字型",role:"信頼",theme:"離婚前に確認する4つのお金",reason:"共感が多め。次は保存される実務投稿で、購入前の納得を作るのがよさそう。"};
  if(guide<Math.max(1,Math.floor(posts.length*.2)))return {hook:"ストーリー型",role:"導線",theme:"誰にも気づかれず始める離婚準備",reason:"導線が少なめ。売り込まず、脈絡を作ってプロフィール/noteへ橋を置くタイミング。"};
  if(sales>0)return {hook:"ストーリー型",role:"レビュー",theme:"また1歩、動き出してくださった方がいました",reason:"noteが売れているので、感謝・追記予告・読者の変化を見せると安心感が積み上がる。"};
  return {hook:"診断型",role:"返信誘発",theme:"それ、モラハラかもしれないチェック",reason:"返信や自己開示を生む診断投稿が合います。"};
}
function renderNext(){
  var r=recommend();
  document.getElementById("next").innerHTML=
  '<div class="card"><h2>次に出すべき投稿</h2><div class="box"><b>'+esc(r.hook)+' × '+esc(r.role)+'</b><br>'+esc(r.reason)+'</div>'+
  '<div class="box"><b>推奨テーマ</b><br>'+esc(r.theme)+'</div></div>'+
  '<div class="card"><h2>そのまま使える下書き</h2><div class="copy">'+esc(makeDraft(r.theme,r.role))+'</div></div>';
}
function makeDraft(theme,role){
  if(role==="信頼")return "離婚前に見ておくべきお金は、まず4つ。\n\n・毎月の生活費\n・子どもの学費\n・今ある貯金\n・養育費や年金分割\n\n全部完璧じゃなくていい。\nでも、ここが見えるだけで『怖い』が少しだけ『考えられる』に変わります。";
  if(role==="導線")return "最近、「"+theme+"」について同じ悩みをよく見ます。\n\n私も最初は、何から始めたらいいか分かりませんでした。\nでも、調停前に準備しておいてよかったことがあります。\n\n必要であれば、プロフィールのnoteにまとめています。";
  if(role==="レビュー")return "また1歩、動き出してくださった方がいました。\n\n私のnoteを選んでくれてありがとうございます。\n\n離婚するかどうかより先に、まず自分と子どもを守る準備を知ってほしい。\n週末に、調停前チェックも追記します。";
  return "これ、当てはまる？\n\n・夫の帰宅音で体が固まる\n・生活費の話をすると責められる\n・子どもの前では笑ってしまう\n・夜にこっそり離婚を検索する\n\nひとつでもあるなら、今すぐ離婚じゃなくていい。まず準備からで大丈夫。";
}
function renderDrafts(){
  document.getElementById("drafts").innerHTML=
  '<div class="card"><h2>投稿生成</h2><p class="muted">テーマを入れると、ふく式ナレッジに沿って3パターン出します。</p><label>テーマ</label><input id="theme" value="夫のただいまが怖い"><p><button class="primary" onclick="makeDrafts()">生成する</button></p></div>'+
  '<div class="card"><h2>生成結果</h2><div id="draftOut"></div></div>';
  makeDrafts();
}
function makeDrafts(){
  var t=document.getElementById("theme")?document.getElementById("theme").value:"夫のただいまが怖い";
  var out=[
    "【共感型】\n"+t+"って、経験した人にしかわからない怖さがある。\n\nでもね、今すぐ離婚を決めなくていい。\nまずは、自分と子どもを守る材料を集めるだけでいい。",
    "【情報緊急型】\n離婚前に知らないと損する人が多いです。\n\n"+t+"で苦しい時ほど、感情で動く前に\n・お金\n・証拠\n・住まい\n・子どもの生活\nこの4つだけ先に確認して。",
    "【導線型】\n最近、"+t+"について同じ相談が増えています。\n\nだから、私が調停前にやってよかった準備をまとめました。\n必要であれば、プロフィールのnoteから見てみてください。"
  ];
  var el=document.getElementById("draftOut"); if(el) el.innerHTML=out.map(function(x){return '<div class="copy">'+esc(x)+'</div>'}).join("");
}

  '<div class="card"><h2>🧠 ふくさん専用ナレッジ</h2>'+
  '<div class="box"><b>立ち位置</b><br>'+esc(KNOWLEDGE.position)+'</div>'+
  '<div class="box"><b>ターゲット</b><br>'+esc(KNOWLEDGE.target)+'</div>'+
  '<div class="box"><b>ひとりに絞ると</b><br>'+esc(KNOWLEDGE.one)+'</div>'+
  '<div class="box"><b>基本メッセージ</b><br>'+esc(KNOWLEDGE.message)+'</div>'+
  '<div class="box"><b>Threads/noteの役割</b><br>'+esc(KNOWLEDGE.rule)+'</div>'+
  '<div class="box"><b>分析ルール</b><br>'+esc(KNOWLEDGE.funnel)+'</div></div>'+
  '<div class="grid2"><div class="card"><h2>強いフック</h2>'+KNOWLEDGE.hooks.map(function(x){return '<div class="post">'+esc(x)+'</div>'}).join("")+'</div>'+
  '<div class="card"><h2>読者の痛み</h2>'+KNOWLEDGE.pain.map(function(x){return '<div class="post">'+esc(x)+'</div>'}).join("")+'</div></div>'+
  '<div class="grid2"><div class="card"><h2>note導線フレーズ</h2>'+KNOWLEDGE.bridge.map(function(x){return '<div class="post">'+esc(x)+'</div>'}).join("")+'</div>'+

function renderFunnel(){
  document.getElementById("funnel").innerHTML=
  '<div class="card"><h2>🪜 ふく式 導線設計</h2><div class="box"><b>基本</b><br>Threadsで全部売らない。Threadsでは「問題提起・共感・自分ごと化」まで。noteで丁寧に説得する。</div>'+
  '<div class="box"><b>流れ</b><br>共感投稿 → 保存される実務投稿 → 脈絡のある導線投稿 → プロフィール → note / マガジン</div>'+
  '<div class="box"><b>告知の脈絡</b><br>「最近同じ相談が多いので」「この前の投稿に反応が多かったので」「ひとりで抱えてる人が多いと感じたので」から始める。</div></div>'+
  '<div class="grid3">'+KNOWLEDGE.roles.map(function(r){return '<div class="card"><h3>'+esc(r[0])+'</h3><p class="mini">'+esc(r[1])+'</p></div>'}).join("")+'</div>';

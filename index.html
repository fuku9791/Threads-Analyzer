<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Threads Analyzer｜ふくさん専用アプリ</title>
  <style>
    :root {
      --bg: #fbf7f4;
      --card: rgba(255, 253, 250, 0.9);
      --line: rgba(222, 207, 198, .76);
      --text: #4f4646;
      --text2: #8a7b78;
      --pink: #c46a91;
      --purple: #8f73b8;
      --orange: #c98251;
      --green: #6a9b82;
      --grad: linear-gradient(135deg, #c56c93 0%, #9b79b8 58%, #7c6fa8 100%);
      --shadow: 0 14px 38px rgba(128, 98, 91, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 8% 0%, rgba(255, 243, 235, .78), transparent 30%),
        radial-gradient(circle at 88% 8%, rgba(238, 229, 247, .74), transparent 31%),
        linear-gradient(135deg, #fbf7f4 0%, #faf6f8 48%, #fff9f3 100%);
      min-height: 100vh;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 252, 248, .82);
      backdrop-filter: blur(20px);
    }
    .headerInner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .title {
      margin: 0;
      font-size: 26px;
      color: #7b5d74;
      letter-spacing: -0.04em;
    }
    .subtitle {
      margin: 6px 0 0;
      color: var(--text2);
      font-size: 12px;
    }
    .brandMark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      margin-right: 8px;
      border-radius: 13px;
      background: linear-gradient(135deg, #fff, #f8eee8);
      box-shadow: 0 12px 28px rgba(122, 91, 83, .10);
      vertical-align: -4px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 250, .7);
      box-shadow: 0 16px 42px rgba(122, 91, 83, .07);
    }
    button, input, textarea, select { font-family: inherit; }
    .tabButton, .primaryButton, .ghostButton, .dangerButton {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .tabButton {
      background: transparent;
      color: #8c7d78;
      border: 1px solid transparent;
    }
    .tabButton.active, .primaryButton {
      color: #fff;
      background: var(--grad);
      box-shadow: 0 14px 26px rgba(122, 91, 83, .16);
    }
    .ghostButton {
      background: rgba(248, 242, 238, .95);
      color: #7d6879;
      border: 1px solid var(--line);
    }
    .dangerButton {
      background: rgba(255, 243, 245, .88);
      color: #b15f72;
      border: 1px solid rgba(231, 197, 204, .72);
    }
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 26px 20px 60px;
    }
    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }
    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .inputGrid {
      display: grid;
      grid-template-columns: .85fr 1.15fr;
      gap: 18px;
      align-items: start;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .statCard {
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .statIcon {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: rgba(250, 241, 236, .88);
      margin-bottom: 10px;
      font-size: 19px;
      box-shadow: inset 0 0 0 1px var(--line);
    }
    .statLabel {
      margin: 0;
      color: var(--text2);
      font-size: 12px;
      font-weight: 700;
    }
    .statValue {
      margin: 9px 0 0;
      font-size: 28px;
      font-weight: 800;
      color: var(--pink);
      line-height: 1.15;
    }
    .tone-purple .statValue { color: var(--purple); }
    .tone-orange .statValue { color: var(--orange); }
    .tone-green .statValue { color: var(--green); }
    .sectionTitle {
      margin: 0 0 14px;
      color: #7b5d74;
      font-size: 17px;
      font-weight: 800;
    }
    .stack { display: flex; flex-direction: column; gap: 14px; }
    .postItem, .knowledgeItem {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 253, 250, .8);
      padding: 16px;
      box-shadow: 0 10px 26px rgba(122, 91, 83, .05);
    }
    .postItem { border-left: 4px solid rgba(196, 106, 145, .42); }
    .postTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .buttonRow { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .postText {
      margin: 0;
      line-height: 1.85;
      white-space: pre-wrap;
      font-size: 14px;
    }
    .note, .meta {
      margin: 7px 0 0;
      color: var(--text2);
      font-size: 12px;
      line-height: 1.7;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: rgba(248, 239, 244, .9);
      padding: 5px 10px;
      color: #9f6280;
      font-size: 12px;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(226, 204, 214, .78);
    }
    .egPill {
      border-radius: 999px;
      background: rgba(238, 247, 241, .95);
      color: #5f9378;
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px #d8eadf;
    }
    .profileBox, .advice {
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255, 248, 244, .88), rgba(247, 242, 249, .88));
      border: 1px solid var(--line);
      padding: 15px;
      line-height: 1.8;
    }
    .smallLabel {
      display: block;
      margin: 0 0 8px;
      color: #9a8b86;
      font-size: 12px;
      font-weight: 700;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(216, 199, 193, .9);
      border-radius: 18px;
      background: rgba(255, 252, 249, .9);
      color: var(--text);
      padding: 12px 13px;
      outline: none;
      font-size: 14px;
    }
    textarea { min-height: 120px; resize: vertical; line-height: 1.7; }
    .formGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .scoreWrap, .barWrap {
      height: 9px;
      border-radius: 999px;
      background: #f0e7ed;
      overflow: hidden;
      margin-top: 9px;
    }
    .scoreFill, .barFill {
      height: 100%;
      border-radius: 999px;
      background: var(--grad);
    }
    .barRow {
      display: grid;
      grid-template-columns: 90px 1fr 54px;
      gap: 10px;
      align-items: center;
      color: var(--text2);
      font-size: 12px;
      margin-bottom: 12px;
    }
    .copyBox {
      background: linear-gradient(135deg, #52424c, #3a3138);
      color: #fff;
      border-radius: 22px;
      padding: 18px;
      white-space: pre-wrap;
      line-height: 1.85;
      font-size: 14px;
    }
    .emptyGlow {
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 24px;
      border: 1px dashed var(--line);
      background: rgba(255, 252, 249, .74);
      color: var(--text2);
      font-weight: 700;
    }
    .hidden { display: none !important; }
    @media (max-width: 900px) {
      .grid4, .grid2, .inputGrid, .formGrid { grid-template-columns: 1fr; }
      .tabs { border-radius: 24px; }
      .title { font-size: 23px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="headerInner">
      <div>
        <h1 class="title"><span class="brandMark">✦</span>Threads Analyzer</h1>
        <p class="subtitle">ふくさん専用｜投稿・導線・note販売までふわっと見える化</p>
      </div>
      <div class="tabs">
        <button class="tabButton active" data-tab="dashboard">📊 ダッシュボード</button>
        <button class="tabButton" data-tab="input">✍️ 投稿入力</button>
        <button class="tabButton" data-tab="csv">📁 CSV</button>
        <button class="tabButton" data-tab="threads">🔗 Threads連携</button>
        <button class="tabButton" data-tab="next">🧭 次の一手</button>
        <button class="tabButton" data-tab="knowledge">🧠 ナレッジ</button>
        <button class="tabButton" data-tab="drafts">✨ 投稿生成</button>
      </div>
    </div>
  </div>

  <main class="main">
    <section id="dashboard" class="tabPanel stack"></section>
    <section id="input" class="tabPanel inputGrid hidden"></section>
    <section id="csv" class="tabPanel grid2 hidden"></section>
    <section id="threads" class="tabPanel grid2 hidden"></section>
    <section id="next" class="tabPanel grid2 hidden"></section>
    <section id="knowledge" class="tabPanel stack hidden"></section>
    <section id="drafts" class="tabPanel grid2 hidden"></section>
  </main>

  <script>
    window.onerror = function(message, source, lineno, colno) {
      document.body.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b15f72;background:#fff7f7;min-height:100vh;"><h2>読み込みエラー</h2><p>' + String(message) + '</p><p>line: ' + lineno + '</p></div>';
      return true;
    };

    const NL = String.fromCharCode(10);
    const HOOK_TYPES = ["質問型", "数字型", "共感型", "逆説型", "ストーリー型", "診断型", "情報緊急型", "その他"];
    const POST_ROLES = ["認知", "共感", "信頼", "導線", "販売", "レビュー", "制作過程", "その他"];
    const READER_PSYCHES = ["怖い", "動けない", "お金が不安", "子どもが不安", "証拠がない", "調停が怖い", "罪悪感", "孤独", "今すぐ知りたい", "その他"];

    const FUKU = {
      core: "弁護士ではなく、調停離婚を経験した三姉妹の母。専門家として上から教えるのではなく、同じように悩むママへ損しない準備の道順を渡す先輩ママ。",
      target: "夫の顔色をうかがいながら、子ども・生活費・住まい・養育費・将来が怖くて離婚に動けない30〜40代ママ。",
      message: "今すぐ離婚しなくていい。でも、自分と子どもを守る材料は集めていい。",
      bridges: ["詳しくはプロフィールのnoteにまとめています", "必要であれば見てみてください", "離婚するかどうかより先に、まず準備の順番を確認してほしい", "今すぐ決めなくていい。でも、損しない準備だけは始めていい"],
      avoid: ["法律の断定をしすぎない", "読者を責める覚悟がないだけ系にしない", "傾聴投稿で強く売らない", "煽りすぎて読者を不安に置き去りにしない"]
    };

    let posts = [
      {id:"1", text:"離婚したいのに動けない理由って、愛情があるからじゃなくて、生活費と子どもの未来が怖いからなんだよね。", date:"2026-05-20", time:"21:00", likes:520, replies:88, reposts:64, views:26000, fc:42, noteClicks:18, noteSales:1, hookType:"共感型", role:"共感", readerPsyche:"お金が不安"},
      {id:"2", text:"離婚前に見るべきお金は4つ。貯金、生活費、学費、退職金と年金。ここを見ないまま動くと不安が増える。", date:"2026-05-21", time:"12:00", likes:310, replies:31, reposts:74, views:18500, fc:28, noteClicks:29, noteSales:2, hookType:"数字型", role:"信頼", readerPsyche:"お金が不安"},
      {id:"3", text:"夫のただいまが怖い人へ。あなたが弱いんじゃない。身体が危険を覚えてしまってるだけ。必要なら、誰にも気づかれず始める心の離婚準備をプロフィールに置いています。", date:"2026-05-22", time:"22:00", likes:740, replies:166, reposts:112, views:42000, fc:91, noteClicks:56, noteSales:3, hookType:"共感型", role:"導線", readerPsyche:"怖い"},
      {id:"4", text:"調停で一番大事なのは、うまく話すことじゃなくて、事実と数字を先に整理しておくこと。感情を責められた人ほど、準備が盾になる。", date:"2026-05-23", time:"15:00", likes:260, replies:24, reposts:58, views:15000, fc:18, noteClicks:16, noteSales:1, hookType:"逆説型", role:"信頼", readerPsyche:"調停が怖い"},
      {id:"5", text:"また1歩、動き出してくださった方がいました。私のnoteを選んでくれてありがとうございます。週末に、調停前チェックの追記をします。", date:"2026-05-24", time:"22:00", likes:190, replies:18, reposts:21, views:9200, fc:12, noteClicks:42, noteSales:2, hookType:"ストーリー型", role:"レビュー", readerPsyche:"今すぐ知りたい"}
    ];

    function esc(v) {
      return String(v == null ? "" : v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function num(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function eg(post) {
      const views = num(post.views);
      if (!views) return 0;
      const score = num(post.likes) + num(post.replies) * 3 + num(post.reposts) * 2;
      return Number(((score / views) * 100).toFixed(2));
    }

    function clickRate(post) {
      const views = num(post.views);
      if (!views) return 0;
      return Number(((num(post.noteClicks) / views) * 100).toFixed(2));
    }

    function salesRate(post) {
      const clicks = num(post.noteClicks);
      if (!clicks) return 0;
      return Number(((num(post.noteSales) / clicks) * 100).toFixed(2));
    }

    function alignScore(post) {
      const text = String(post.text || "");
      let score = 0;
      ["夫","子ども","生活費","養育費","調停","証拠","お金","怖い","準備","離婚","モラハラ"].forEach(w => { if (text.includes(w)) score += 4; });
      if (/プロフィール|note|マガジン|まとめ/.test(text)) score += 12;
      if (/怖い|動けない|罪悪感|ひとり|検索|ただいま|帰宅音/.test(text)) score += 10;
      if (/今すぐ離婚|決めなくていい|準備|守る材料|順番/.test(text)) score += 16;
      return clamp(score, 0, 100);
    }

    function funnel(post) {
      const text = String(post.text || "");
      let score = 0;
      const e = eg(post);
      const cr = clickRate(post);
      const sr = salesRate(post);
      if (e >= 2) score += 18; else if (e >= 1) score += 12; else if (e >= .5) score += 7;
      if (cr >= .12) score += 22; else if (cr >= .06) score += 15; else if (cr > 0) score += 8;
      if (sr >= 5) score += 25; else if (sr >= 2) score += 16; else if (sr > 0) score += 9;
      if (["導線","販売","信頼","レビュー"].includes(post.role)) score += 10;
      if (/プロフィール|note|まとめ|必要であれば|見てみて|準備|追記|選んでくれて/.test(text)) score += 10;
      score += Math.round(alignScore(post) * .18);
      return clamp(score, 0, 100);
    }

    function classify(text) {
      const t = String(text || "");
      let hookType = "共感型", role = "共感", readerPsyche = "怖い";
      if (/\d|[一二三四五六七八九十]つ|ステップ|項目/.test(t)) hookType = "数字型";
      if (/知らないと損|損する|絶対|今すぐ|注意|やってはいけない/.test(t)) hookType = "情報緊急型";
      if (/診断|チェック|ひとつでも|当てはまる/.test(t)) hookType = "診断型";
      if (/じゃなくて|実は|一番大事なのは|よりも/.test(t)) hookType = "逆説型";
      if (/私|あの日|また1歩|選んでくれて|経験/.test(t)) hookType = "ストーリー型";
      if (/プロフィール|note|まとめました|リンク|マガジン/.test(t)) role = "導線";
      else if (/売れ|購入|選んでくれて|ありがとう|追記|レビュー/.test(t)) role = "レビュー";
      else if (/確認|チェック|調停|養育費|証拠|制度|財産分与|年金/.test(t)) role = "信頼";
      if (/お金|生活費|貯金|学費|養育費|家賃|年金|財産分与/.test(t)) readerPsyche = "お金が不安";
      if (/子ども|子供|親権|転校|進学|学校/.test(t)) readerPsyche = "子どもが不安";
      if (/証拠|録音|記録|日記|LINE/.test(t)) readerPsyche = "証拠がない";
      if (/調停|裁判所|公正証書/.test(t)) readerPsyche = "調停が怖い";
      if (/今すぐ|知らないと損|絶対|注意/.test(t)) readerPsyche = "今すぐ知りたい";
      if (/怖い|帰宅|ただいま|足音|鍵|心臓|動悸/.test(t)) readerPsyche = "怖い";
      return {hookType, role, readerPsyche};
    }

    function normalize(post) {
      const auto = classify(post.text);
      return {
        id: post.id || Math.random().toString(36).slice(2),
        text: String(post.text || "").trim(),
        date: post.date || new Date().toISOString().slice(0,10),
        time: post.time || "21:00",
        likes: num(post.likes),
        replies: num(post.replies),
        reposts: num(post.reposts),
        views: num(post.views),
        fc: num(post.fc),
        noteClicks: num(post.noteClicks),
        noteSales: num(post.noteSales),
        hookType: post.hookType || auto.hookType,
        role: post.role || auto.role,
        readerPsyche: post.readerPsyche || auto.readerPsyche
      };
    }

    function hour(post) {
      const h = Number(String(post.time || "00:00").split(":")[0]);
      return Number.isFinite(h) && h >= 0 && h <= 23 ? h : 0;
    }

    function hourLabel(h) {
      return String(h).padStart(2,"0") + ":00";
    }

    function band(h) {
      if (h >= 5 && h <= 10) return "朝";
      if (h >= 11 && h <= 14) return "昼";
      if (h >= 15 && h <= 18) return "夕方";
      if (h >= 19 && h <= 23) return "夜";
      return "深夜";
    }

    function goldenTime() {
      const buckets = Array.from({length:24}, (_, h) => ({
        hour:h, label:hourLabel(h), band:band(h), count:0, views:0, egTotal:0, funnelTotal:0, clicks:0, sales:0, replies:0, fc:0
      }));
      posts.forEach(p => {
        const b = buckets[hour(p)];
        b.count++;
        b.views += num(p.views);
        b.egTotal += eg(p);
        b.funnelTotal += funnel(p);
        b.clicks += num(p.noteClicks);
        b.sales += num(p.noteSales);
        b.replies += num(p.replies);
        b.fc += num(p.fc);
      });
      const ranking = buckets.map(b => {
        const avgEg = b.count ? Number((b.egTotal / b.count).toFixed(2)) : 0;
        const avgFunnel = b.count ? Math.round(b.funnelTotal / b.count) : 0;
        const cr = b.views ? Number(((b.clicks / b.views) * 100).toFixed(2)) : 0;
        const salesPerPost = b.count ? Number((b.sales / b.count).toFixed(2)) : 0;
        const replyPerPost = b.count ? Number((b.replies / b.count).toFixed(1)) : 0;
        const confidence = b.count >= 5 ? 100 : b.count >= 3 ? 72 : b.count === 2 ? 48 : b.count === 1 ? 26 : 0;
        const score = b.count ? Math.round(avgEg*8 + avgFunnel*.55 + cr*18 + salesPerPost*18 + replyPerPost*.18 + Math.min(b.count,5)*4) : 0;
        return {...b, avgEg, avgFunnel, confidence, score};
      }).filter(x => x.count).sort((a,b) => b.score - a.score).slice(0,5);
      const best = ranking[0];
      if (!best) return {bestLabel:"データ待ち", bestBand:"未判定", confidence:0, insight:"投稿データを追加すると、勝ち時間を判定します。", ranking:[]};
      return {bestLabel:best.label, bestBand:best.band, confidence:best.confidence, insight:`${best.label}台が今のところ最有力です。平均EG率${best.avgEg}%、平均導線${best.avgFunnel}点、noteクリック${best.clicks}件、購入${best.sales}件。`, ranking};
    }

    function recommend() {
      if (!posts.length) return {hook:"共感型", role:"共感", psyche:"怖い", theme:"夫のただいまが怖い", reason:"まだデータがないので、まず読者の痛みを止める共感投稿から始めます。"};
      const totalSales = posts.reduce((s,p)=>s+num(p.noteSales),0);
      const guide = posts.filter(p=>p.role==="導線").length;
      const trust = posts.filter(p=>p.role==="信頼").length;
      const empathy = posts.filter(p=>p.role==="共感").length;
      if (empathy >= posts.length*.45 && trust < posts.length*.25) return {hook:"数字型", role:"信頼", psyche:"お金が不安", theme:"離婚前に確認する4つのお金", reason:"共感投稿が多めです。読者が保存できる実務投稿を挟むと、note購入前の納得が作れます。"};
      if (guide < Math.max(1, Math.floor(posts.length*.18))) return {hook:"ストーリー型", role:"導線", psyche:"怖い", theme:"誰にも気づかれず始める離婚準備", reason:"導線投稿が少なめです。売り込まず、脈絡を作ってプロフィール/noteへ橋を置くタイミングです。"};
      if (totalSales > 0) return {hook:"ストーリー型", role:"レビュー", psyche:"今すぐ知りたい", theme:"また1歩、動き出してくださった方がいました", reason:"noteが売れています。売れた事実・感謝・追記予告を出すと、人気感と安心感が積み上がります。"};
      return {hook:"診断型", role:"診断", psyche:"怖い", theme:"それ、モラハラかもしれないチェック", reason:"次は返信・自己開示を生む診断型が合います。"};
    }

    function draft(rec) {
      if (rec.role === "信頼") return ["離婚前に見ておくべきお金は、まず4つ。","","・毎月の生活費","・子どもの学費","・今ある貯金","・養育費や年金分割","","全部完璧じゃなくていい。","でも、ここが見えるだけで『怖い』が少しだけ『考えられる』に変わります。"].join(NL);
      if (rec.role === "導線") return [`最近、${rec.theme}について同じ悩みをよく見ます。`,"","私も最初は、何から始めたらいいか分かりませんでした。","でも、調停前に準備しておいてよかったことがあります。","","必要であれば、プロフィールのnoteにまとめています。"].join(NL);
      if (rec.role === "レビュー") return ["また1歩、動き出してくださった方がいました。","","私のnoteを選んでくれてありがとうございます。","","離婚するかどうかより先に、まず自分と子どもを守る準備を知ってほしい。","週末に、調停前チェックも追記します。"].join(NL);
      return ["これ、当てはまる？","","・夫の帰宅音で体が固まる","・生活費の話をすると責められる","・子どもの前では笑ってしまう","・夜にこっそり離婚を検索する","","ひとつでもあるなら、今すぐ離婚じゃなくていい。まず準備からで大丈夫。"].join(NL);
    }

    function stat(icon, tone, label, value, note) {
      return `<div class="card statCard tone-${tone}"><div class="statIcon">${icon}</div><p class="statLabel">${esc(label)}</p><p class="statValue">${esc(value)}</p>${note ? `<p class="note">${esc(note)}</p>` : ""}</div>`;
    }

    function badge(v) {
      return `<span class="badge">${esc(v)}</span>`;
    }

    function bar(v) {
      return `<div class="scoreWrap"><div class="scoreFill" style="width:${clamp(v,0,100)}%"></div></div>`;
    }

    function stats() {
      const sorted = [...posts].sort((a,b)=>funnel(b)-funnel(a));
      const avgEg = posts.length ? (posts.reduce((s,p)=>s+eg(p),0)/posts.length).toFixed(2) : "0.00";
      const totalClicks = posts.reduce((s,p)=>s+num(p.noteClicks),0);
      const totalSales = posts.reduce((s,p)=>s+num(p.noteSales),0);
      const gt = goldenTime();
      const rec = recommend();
      const hooks = HOOK_TYPES.map(hook => {
        const group = posts.filter(p=>p.hookType===hook);
        const score = group.length ? Math.round(group.reduce((s,p)=>s+funnel(p),0)/group.length) : 0;
        return {hook, count:group.length, score};
      }).filter(x=>x.count).sort((a,b)=>b.score-a.score);
      return {sorted, avgEg, totalClicks, totalSales, gt, rec, hooks};
    }

        </div>
        <div class="card">
          <h2 class="sectionTitle">導線スコアランキング</h2>
          <div class="stack">
            ${s.sorted.map((p,i)=>`
              <div class="postItem">

                  <div class="buttonRow"><strong>#${i+1}</strong>${badge(p.hookType)}${badge(p.role)}${badge(p.readerPsyche)}</div>
                  <span class="egPill">導線 ${funnel(p)}点</span>
                </div>
                ${bar(funnel(p))}
                <p class="postText" style="margin-top:12px;">${esc(p.text)}</p>
                <p class="meta">EG ${eg(p)}% / noteクリック率 ${clickRate(p)}% / note購入率 ${salesRate(p)}% / ${esc(p.date)} ${esc(p.time)}</p>
              </div>`).join("")}
          </div>
        </div>`;
    }

    function advice() {
      const s = stats();
      const top = s.sorted[0];
      if (!top) return ["投稿データを追加すると、ふく式ナレッジに沿った分析が表示されます。"];

    function addPost() {
      const text = document.getElementById("text").value.trim();
      if (!text) return alert("投稿本文を入れてね");

      posts.unshift(normalize({
        text,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,

        role: auto.role,
        readerPsyche: auto.readerPsyche
      }));
      renderAll();
      switchTab("input");
    }

    function deletePost(id) {
      posts = posts.filter(p => p.id !== id);
      renderAll();

      document.getElementById("csv").innerHTML = `

            <button class="primaryButton" onclick="importCsv()">CSVを取り込む</button>
            <button class="ghostButton" onclick="sampleCsv()">サンプルCSV</button>
          </div>
          <div id="csvMessage" class="advice" style="margin-top:12px;display:none;"></div>
        </div>
        <div class="card">
          <h2 class="sectionTitle">CSV列の意味</h2>
          <div class="stack">
            ${["text","date","time","likes","replies","reposts","views","fc","noteClicks","noteSales"].map(x=>`<div class="knowledgeItem"><strong>${x}</strong><p class="note">投稿本文・日時・Threads数値・note成果を入れます。</p></div>`).join("")}
          </div>
        </div>`;
    }

    function parseLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;
      for (let i=0;i<line.length;i++) {
        const ch = line[i], next = line[i+1];
        if (ch === '"' && inQuotes && next === '"') { current += '"'; i++; }
        else if (ch === '"') inQuotes = !inQuotes;
        else if (ch === "," && !inQuotes) { result.push(current.trim()); current = ""; }
        else current += ch;
      }
      result.push(current.trim());
      return result;
    }

    function importCsv() {
      const text = document.getElementById("csvText").value;
      const lines = text.split(/\r?\n/).filter(x=>x.trim());
      const msg = document.getElementById("csvMessage");
      if (lines.length < 2) { msg.style.display="block"; msg.textContent="CSVを読み込めませんでした。"; return; }
      const headers = parseLine(lines[0]);
      const imported = lines.slice(1).map(line => {
        const vals = parseLine(line);
        const obj = {};
        headers.forEach((h,i)=>obj[h]=vals[i] || "");
        return normalize(obj);
      }).filter(p=>p.text);
      posts = imported.concat(posts);
      msg.style.display="block";
      msg.textContent = imported.length + "件を取り込みました。";
      renderAll();
      switchTab("csv");
    }

    function importThreadsJson() {
      const msg = document.getElementById("threadsMessage");
      try {
        const raw = JSON.parse(document.getElementById("threadsJson").value);
        const items = Array.isArray(raw) ? raw : Array.isArray(raw.data) ? raw.data : [];
        const imported = items.map(item => normalize({
          text: item.text || item.caption || item.body || "",
          date: item.timestamp ? new Date(item.timestamp).toISOString().slice(0,10) : new Date().toISOString().slice(0,10),
          time: item.timestamp ? new Date(item.timestamp).toISOString().slice(11,16) : "21:00",
          likes: item.insights && item.insights.likes || item.likes || 0,
          replies: item.insights && item.insights.replies || item.replies || 0,
          reposts: item.insights && item.insights.reposts || item.reposts || 0,
          views: item.insights && item.insights.views || item.views || 0

        posts = imported.concat(posts);
        msg.style.display="block";
        msg.textContent = imported.length + "件を取り込みました。";
        renderAll();
        switchTab("threads");
      } catch(e) {
        msg.style.display="block";
        msg.textContent = "JSONの形式を確認してください。";
      }

    function switchTab(tab) {
      document.querySelectorAll(".tabPanel").forEach(p => p.classList.add("hidden"));
      document.getElementById(tab).classList.remove("hidden");
      document.querySelectorAll(".tabButton").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    }

    document.querySelectorAll(".tabButton").forEach(button => {

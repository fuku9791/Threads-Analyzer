function loadData(){try{var s=localStorage.getItem("fuku_threads_analyzer_posts_v3");if(s){var p=JSON.parse(s);if(Array.isArray(p))return p}}catch(e){}return defaultPosts.slice()}

function showTab(id,btn){document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active")});document.getElementById(id).classList.add("active");document.querySelectorAll(".tab").forEach(function(b){b.classList.remove("active")});if(btn)btn.classList.add("active")}
function n(v){v=Number(v);return isFinite(v)?v:0}function esc(s){return String(s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}
function eg(p){return p.views?((n(p.likes)+n(p.replies)*3+n(p.reposts)*2)/n(p.views)*100):0}function clickRate(p){return p.views?(n(p.clicks)/n(p.views)*100):0}function salesRate(p){return p.clicks?(n(p.sales)/n(p.clicks)*100):0}
function alignScore(p){var t=p.text||"",s=0;["夫","子ども","生活費","養育費","調停","証拠","お金","怖い","準備","離婚","モラハラ"].forEach(function(w){if(t.indexOf(w)>=0)s+=4});if(/プロフィール|note|マガジン|まとめ/.test(t))s+=12;if(/怖い|動けない|罪悪感|検索|ただいま|帰宅音/.test(t))s+=10;if(/今すぐ離婚|決めなくていい|準備|守る材料|順番/.test(t))s+=16;return Math.min(100,s)}
function funnel(p){var s=0,e=eg(p),cr=clickRate(p),sr=salesRate(p),t=p.text||"";if(e>=2)s+=18;else if(e>=1)s+=12;else if(e>.5)s+=7;if(cr>=.12)s+=22;else if(cr>=.06)s+=15;else if(cr>0)s+=8;if(sr>=5)s+=25;else if(sr>=2)s+=16;else if(sr>0)s+=9;if(["導線","販売","信頼","レビュー"].indexOf(p.role)>=0)s+=10;if(/プロフィール|note|準備|追記|まとめ|必要であれば/.test(t))s+=10;if(/怖い|動けない|子ども|生活費|養育費|調停|証拠|お金|離婚|モラハラ/.test(t))s+=7;s+=Math.round(alignScore(p)*.15);return Math.min(100,s)}
function classify(t){var type="共感型",role="共感",psyche="怖い";if(/\d|4つ|ステップ|項目|選/.test(t))type="数字型";if(/知らないと損|絶対|今すぐ|注意|やってはいけない|9割/.test(t))type="情報緊急型";if(/診断|チェック|当てはまる|ひとつでも/.test(t))type="診断型";if(/じゃなくて|実は|一番大事|よりも/.test(t))type="逆説型";if(/私|あの日|また1歩|選んでくれて|経験|調停離婚/.test(t))type="ストーリー型";if(/プロフィール|note|まとめ|マガジン|リンク/.test(t))role="導線";else if(/売れ|購入|選んでくれて|ありがとう|追記|レビュー/.test(t))role="レビュー";else if(/調停|養育費|証拠|制度|お金|確認|財産分与|年金|生活費/.test(t))role="信頼";if(/お金|生活費|貯金|学費|養育費|家賃|年金|財産分与/.test(t))psyche="お金が不安";if(/子ども|子供|親権|転校|進学|学校/.test(t))psyche="子どもが不安";if(/証拠|録音|記録|日記|LINE/.test(t))psyche="証拠がない";if(/調停|裁判所|公正証書/.test(t))psyche="調停が怖い";if(/罪悪感|父親を奪う|我慢/.test(t))psyche="罪悪感";if(/今すぐ|知らないと損|絶対|注意/.test(t))psyche="今すぐ知りたい";if(/怖い|帰宅|ただいま|足音|鍵|心臓|動悸/.test(t))psyche="怖い";return{type:type,role:role,psyche:psyche}}
function hourOf(p){var h=Number(String(p.time||"00:00").split(":")[0]);return isFinite(h)&&h>=0&&h<=23?h:0}function hourLabel(h){return String(h).padStart(2,"0")+":00"}function band(h){if(h>=5&&h<=10)return"朝";if(h>=11&&h<=14)return"昼";if(h>=15&&h<=18)return"夕方";if(h>=19&&h<=23)return"夜";return"深夜"}function fmt(v){return Math.round(n(v)).toLocaleString("ja-JP")}function pct(v){return n(v).toFixed(2)+"%"}function avg(arr,fn){return arr.length?arr.reduce(function(s,x){return s+fn(x)},0)/arr.length:0}function median(nums){if(!nums.length)return 0;var a=nums.slice().sort(function(x,y){return x-y}),m=Math.floor(a.length/2);return a.length%2?a[m]:(a[m-1]+a[m])/2}
function hourStats(){var hs=[];for(var h=0;h<24;h++)hs.push({hour:h,label:hourLabel(h),band:band(h),posts:[],count:0,views:0,avgViews:0,medianViews:0,avgEg:0,avgFunnel:0,clicks:0,sales:0,replies:0,reposts:0,fc:0,viewScore:0,clickScore:0,salesScore:0,totalScore:0,confidence:0});posts.forEach(function(p){hs[hourOf(p)].posts.push(p)});hs.forEach(function(x){x.count=x.posts.length;x.views=x.posts.reduce(function(s,p){return s+n(p.views)},0);x.avgViews=avg(x.posts,function(p){return n(p.views)});x.medianViews=median(x.posts.map(function(p){return n(p.views)}));x.avgEg=avg(x.posts,eg);x.avgFunnel=avg(x.posts,funnel);x.clicks=x.posts.reduce(function(s,p){return s+n(p.clicks)},0);x.sales=x.posts.reduce(function(s,p){return s+n(p.sales)},0);x.replies=x.posts.reduce(function(s,p){return s+n(p.replies)},0);x.reposts=x.posts.reduce(function(s,p){return s+n(p.reposts)},0);x.fc=x.posts.reduce(function(s,p){return s+n(p.fc)},0);x.viewScore=x.count?Math.round((x.avgViews/1000)+(x.medianViews/1400)+Math.min(x.count,5)*5):0;x.clickScore=x.count?Math.round(x.clicks*1.2+clickRate({views:x.views,clicks:x.clicks})*40):0;x.salesScore=x.count?Math.round(x.sales*18+salesRate({clicks:x.clicks,sales:x.sales})*2):0;x.confidence=x.count>=5?100:x.count>=3?72:x.count==2?48:x.count==1?26:0;x.totalScore=Math.round(x.viewScore*.45+x.avgFunnel*.25+x.clickScore*.18+x.salesScore*.12)});return hs}
function bandStats(){var map={};hourStats().filter(function(h){return h.count}).forEach(function(h){if(!map[h.band])map[h.band]={band:h.band,count:0,views:0,clicks:0,sales:0,score:0,hours:0};map[h.band].count+=h.count;map[h.band].views+=h.views;map[h.band].clicks+=h.clicks;map[h.band].sales+=h.sales;map[h.band].score+=h.totalScore;map[h.band].hours++});return Object.values(map).map(function(b){b.avgViews=b.count?b.views/b.count:0;b.avgScore=b.hours?Math.round(b.score/b.hours):0;return b}).sort(function(a,b){return b.avgScore-a.avgScore})}

function makeDrafts(){var t=document.getElementById("theme")?document.getElementById("theme").value:"夫のただいまが怖い";var out=["【共感型】\n"+t+"って、経験した人にしかわからない怖さがある。\n\nでもね、今すぐ離婚を決めなくていい。\nまずは、自分と子どもを守る材料を集めるだけでいい。","【情報緊急型】\n離婚前に知らないと損する人が多いです。\n\n"+t+"で苦しい時ほど、感情で動く前に\n・お金\n・証拠\n・住まい\n・子どもの生活\nこの4つだけ先に確認して。","【導線型】\n最近、"+t+"について同じ相談が増えています。\n\nだから、私が調停前にやってよかった準備をまとめました。\n必要であれば、プロフィールのnoteから見てみてください。","【診断型】\nこれ、当てはまる？\n\n・夫の機嫌で予定が変わる\n・帰宅音で体が固まる\n・生活費の話をすると責められる\n・離婚したいのにお金が怖い\n\nひとつでもあるなら、まず準備からで大丈夫。"];var el=document.getElementById("draftOut");if(el)el.innerHTML=out.map(function(x){return'<div class="copy">'+esc(x)+'</div>'}).join("")}
function renderKnowledge(){document.getElementById("knowledge").innerHTML='<div class="card"><h2>🧠 ふくさん専用ナレッジ</h2><div class="box"><b>立ち位置</b><br>'+esc(KNOWLEDGE.position)+'</div><div class="box"><b>ターゲット</b><br>'+esc(KNOWLEDGE.target)+'</div><div class="box"><b>ひとりに絞ると</b><br>'+esc(KNOWLEDGE.one)+'</div><div class="box"><b>基本メッセージ</b><br>'+esc(KNOWLEDGE.message)+'</div><div class="box"><b>Threads/noteの役割</b><br>'+esc(KNOWLEDGE.rule)+'</div><div class="box"><b>分析ルール</b><br>'+esc(KNOWLEDGE.funnel)+'</div></div><div class="grid2"><div class="card"><h2>強いフック</h2>'+KNOWLEDGE.hooks.map(function(x){return'<div class="post">'+esc(x)+'</div>'}).join("")+'</div><div class="card"><h2>読者の痛み</h2>'+KNOWLEDGE.pain.map(function(x){return'<div class="post">'+esc(x)+'</div>'}).join("")+'</div></div><div class="grid2"><div class="card"><h2>note導線フレーズ</h2>'+KNOWLEDGE.bridge.map(function(x){return'<div class="post">'+esc(x)+'</div>'}).join("")+'</div><div class="card"><h2>避けること</h2>'+KNOWLEDGE.avoid.map(function(x){return'<div class="post">'+esc(x)+'</div>'}).join("")+'</div></div>'}

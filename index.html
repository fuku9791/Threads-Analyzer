  </style>
</head>

    const DEFAULT_PROFILE = {

    };

    const SAMPLE_POSTS = [
      {

        text: "夫のただいまが怖い人へ。あなたが弱いんじゃない。身体が危険を覚えてしまってるだけ。必要なら、誰にも気づかれず始める心の離婚準備をプロフィールに置いています。",

    function toNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function engagementRate(post) {
      const views = toNumber(post.views);
      if (views <= 0) return 0;
      const score = toNumber(post.likes) + toNumber(post.replies) * 3 + toNumber(post.reposts) * 2;
      return Number(((score / views) * 100).toFixed(2));
    }

    function clickRate(post) {
      const views = toNumber(post.views);
      if (views <= 0) return 0;
      return Number(((toNumber(post.noteClicks) / views) * 100).toFixed(2));
    }

    function salesRate(post) {
      const clicks = toNumber(post.noteClicks);
      if (clicks <= 0) return 0;
      return Number(((toNumber(post.noteSales) / clicks) * 100).toFixed(2));
    }

    function profileAlignmentScore(post) {
      const text = String(post.text || "");
      let score = 0;
      ["夫", "子ども", "生活費", "養育費", "調停", "証拠", "お金", "怖い", "準備", "離婚", "モラハラ"].forEach((word) => {
        if (text.includes(word)) score += 4;
      });
      if (/今すぐ離婚|決めなくていい|準備|守る材料|順番/.test(text)) score += 16;
      if (/プロフィール|note|マガジン|まとめ/.test(text)) score += 12;
      if (/怖い|動けない|罪悪感|ひとり|検索|ただいま|帰宅音/.test(text)) score += 10;
      return clamp(score, 0, 100);
    }

    function funnelScore(post) {
      let score = 0;
      const text = String(post.text || "");
      const eg = engagementRate(post);
      const cr = clickRate(post);
      const sr = salesRate(post);

      if (eg >= 2) score += 18;
      else if (eg >= 1) score += 12;
      else if (eg >= 0.5) score += 7;

      if (cr >= 0.12) score += 22;
      else if (cr >= 0.06) score += 15;
      else if (cr > 0) score += 8;

      if (sr >= 5) score += 25;
      else if (sr >= 2) score += 16;
      else if (sr > 0) score += 9;

      if (["導線", "販売", "信頼", "レビュー"].includes(post.role)) score += 10;
      if (/プロフィール|note|まとめ|必要であれば|見てみて|準備|追記|選んでくれて/.test(text)) score += 10;
      if (/怖い|動けない|子ども|生活費|養育費|調停|証拠|お金|離婚|モラハラ/.test(text)) score += 7;

      score += Math.round(profileAlignmentScore(post) * 0.18);
      return clamp(score, 0, 100);
    }

    function makeId() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function classifyPost(text) {
      const t = String(text || "");
      let hookType = "共感型";
      let role = "共感";
      let readerPsyche = "怖い";

      if (/\d|[0-9]|[一二三四五六七八九十]つ|選|ステップ|項目/.test(t)) hookType = "数字型";
      if (/知らないと損|損する|9割|絶対|今すぐ|注意|やってはいけない/.test(t)) hookType = "情報緊急型";
      if (/これ、当てはまる|あなたはどれ|診断|チェック|ひとつでも/.test(t)) hookType = "診断型";
      if (/じゃなくて|実は|本当は|一番大事なのは|よりも/.test(t)) hookType = "逆説型";
      if (/私|あの日|昨日|また1歩|選んでくれて|経験|調停離婚/.test(t)) hookType = "ストーリー型";
      if (/\?|？|どう思う|わかる/.test(t)) hookType = "質問型";

      if (/プロフィール|note|必要であれば|見てみて|まとめました|リンク|マガジン/.test(t)) role = "導線";
      else if (/売れ|購入|選んでくれて|ありがとうございます|追記|レビュー|読者の声/.test(t)) role = "レビュー";
      else if (/作って|制作|追加|準備中|週末に|近日/.test(t)) role = "制作過程";
      else if (/4つ|確認|チェック|調停|養育費|証拠|制度|財産分与|年金/.test(t)) role = "信頼";

      if (/お金|生活費|貯金|学費|養育費|家賃|年金|財産分与/.test(t)) readerPsyche = "お金が不安";
      if (/子ども|子供|親権|転校|進学|学校/.test(t)) readerPsyche = "子どもが不安";
      if (/証拠|録音|記録|日記|LINE/.test(t)) readerPsyche = "証拠がない";
      if (/調停|裁判所|公正証書|離婚届不受理/.test(t)) readerPsyche = "調停が怖い";
      if (/罪悪感|父親を奪う|私が悪い|我慢/.test(t)) readerPsyche = "罪悪感";
      if (/ひとり|孤独|誰にも|相談/.test(t)) readerPsyche = "孤独";
      if (/今すぐ|知らないと損|絶対|注意|やってはいけない/.test(t)) readerPsyche = "今すぐ知りたい";
      if (/怖い|帰宅|ただいま|足音|鍵|心臓|動悸/.test(t)) readerPsyche = "怖い";

      return { hookType, role, readerPsyche };
    }

    function normalizePost(post) {
      const auto = classifyPost(post.text);
      return {
        id: post.id || makeId(),
        text: String(post.text || "").trim(),
        date: post.date || new Date().toISOString().slice(0, 10),
        time: post.time || "21:00",

        fc: toNumber(post.fc),

        hookType: post.hookType || auto.hookType,
        role: post.role || auto.role,
        readerPsyche: post.readerPsyche || auto.readerPsyche
      };
    }

    function hourLabel(hour) {
      const h = Number(hour);
      if (!Number.isFinite(h)) return "不明";
      return `${String(h).padStart(2, "0")}:00`;
    }

    function getPostHour(post) {
      const raw = String(post?.time || "00:00");
      const hour = Number(raw.split(":")[0]);
      return Number.isFinite(hour) && hour >= 0 && hour <= 23 ? hour : 0;
    }

    function getTimeBand(hour) {
      const h = Number(hour);
      if (h >= 5 && h <= 10) return "朝";
      if (h >= 11 && h <= 14) return "昼";
      if (h >= 15 && h <= 18) return "夕方";
      if (h >= 19 && h <= 23) return "夜";
      return "深夜";
    }

    function analyzeGoldenTime(posts) {
      if (!posts.length) {
        return {
          bestLabel: "データ待ち",
          bestBand: "未判定",
          confidence: 0,
          insight: "投稿データを追加すると、ふくさんだけの勝ち時間を判定します。",
          ranking: []
        };
      }

      const byHour = Array.from({ length: 24 }, (_, hour) => ({
        hour,
        label: hourLabel(hour),
        band: getTimeBand(hour),
        count: 0,
        views: 0,
        egTotal: 0,
        funnelTotal: 0,
        clicks: 0,
        sales: 0,
        replies: 0,
        fc: 0
      }));

      posts.forEach((post) => {
        const hour = getPostHour(post);
        const bucket = byHour[hour];
        bucket.count += 1;
        bucket.views += toNumber(post.views);
        bucket.egTotal += engagementRate(post);
        bucket.funnelTotal += funnelScore(post);
        bucket.clicks += toNumber(post.noteClicks);
        bucket.sales += toNumber(post.noteSales);
        bucket.replies += toNumber(post.replies);
        bucket.fc += toNumber(post.fc);
      });

      const hourly = byHour.map((bucket) => {
        const avgEg = bucket.count ? Number((bucket.egTotal / bucket.count).toFixed(2)) : 0;
        const avgFunnel = bucket.count ? Math.round(bucket.funnelTotal / bucket.count) : 0;
        const clickRateValue = bucket.views ? Number(((bucket.clicks / bucket.views) * 100).toFixed(2)) : 0;
        const salesPerPost = bucket.count ? Number((bucket.sales / bucket.count).toFixed(2)) : 0;
        const replyPerPost = bucket.count ? Number((bucket.replies / bucket.count).toFixed(1)) : 0;
        const fcPerPost = bucket.count ? Number((bucket.fc / bucket.count).toFixed(1)) : 0;
        const confidence = bucket.count >= 5 ? 100 : bucket.count >= 3 ? 72 : bucket.count === 2 ? 48 : bucket.count === 1 ? 26 : 0;
        const score = bucket.count ? Math.round(
          avgEg * 8 +
          avgFunnel * 0.55 +
          clickRateValue * 18 +
          salesPerPost * 18 +
          replyPerPost * 0.18 +
          fcPerPost * 0.12 +
          Math.min(bucket.count, 5) * 4
        ) : 0;

        return {
          ...bucket,
          avgEg,
          avgFunnel,
          clickRateValue,
          salesPerPost,
          replyPerPost,
          fcPerPost,
          confidence,
          score
        };
      });

      const ranking = hourly.filter((item) => item.count > 0).sort((a, b) => b.score - a.score).slice(0, 5);
      const best = ranking[0];

      if (!best) {
        return {
          bestLabel: "データ待ち",
          bestBand: "未判定",
          confidence: 0,
          insight: "時間付きの投稿データがまだありません。",
          ranking: []
        };
      }

      return {
        bestLabel: best.label,
        bestBand: best.band,
        confidence: best.confidence,
        insight: `${best.label}台が今のところ最有力です。平均EG率${best.avgEg}%、平均導線${best.avgFunnel}点、noteクリック${best.clicks}件、購入${best.sales}件。`,
        ranking
      };
    }

      const totalSales = posts.reduce((sum, p) => sum + toNumber(p.noteSales), 0);

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function parseCsv(text) {
      const lines = String(text || "").split(/\r?\n/).filter((line) => line.trim() !== "");
      if (lines.length < 2) return [];

      const headers = parseCsvLine(lines[0]).map((h) => h.trim());

      return lines.slice(1).map((line) => {
        const values = parseCsvLine(line);
        const obj = {};
        headers.forEach((h, index) => {
          obj[h] = values[index] || "";
        });
        return normalizePost(obj);
      }).filter((post) => post.text);
    }

    function normalizeThreadsApiPost(item) {
      const text = item?.text || item?.caption || item?.body || "";
      const created = item?.timestamp || item?.created_time || item?.date || new Date().toISOString();
      const d = new Date(created);
      const date = Number.isNaN(d.getTime()) ? new Date().toISOString().slice(0, 10) : d.toISOString().slice(0, 10);
      const time = Number.isNaN(d.getTime()) ? "21:00" : d.toISOString().slice(11, 16);
      const insights = item?.insights || item || {};
      const auto = classifyPost(text);

      return normalizePost({
        text,
        date,
        time,
        likes: insights.likes || insights.like_count || item?.like_count || 0,
        replies: insights.replies || insights.reply_count || item?.reply_count || 0,
        reposts: insights.reposts || insights.repost_count || item?.repost_count || 0,
        views: insights.views || insights.view_count || item?.view_count || 0,
        fc: 0,
        noteClicks: 0,
        noteSales: 0,
        hookType: auto.hookType,
        role: auto.role,
        readerPsyche: auto.readerPsyche
      });
    }

    function buildThreadsAuthUrl(config) {
      const clientId = String(config?.clientId || "").trim();
      const redirectUri = String(config?.redirectUri || "").trim();
      const scopes = Array.isArray(config?.scopes) && config.scopes.length ? config.scopes : ["threads_basic"];

      if (!clientId || !redirectUri) return "";

      const params = new URLSearchParams({
        client_id: clientId,
        redirect_uri: redirectUri,
        scope: scopes.join(","),
        response_type: "code"
      });

      return `https://www.threads.net/oauth/authorize?${params.toString()}`;
    }

    function normalizeThreadsJson(text) {
      const raw = JSON.parse(text);
      const items = Array.isArray(raw) ? raw : Array.isArray(raw?.data) ? raw.data : [];
      return items.map(normalizeThreadsApiPost).filter((post) => post.text);
    }

                <button className={tabButtonClass("input")} onClick={() => setTab("input")}>✍️ 投稿入力</button>
                <button className={tabButtonClass("csv")} onClick={() => setTab("csv")}>📁 CSV</button>
                <button className={tabButtonClass("threads")} onClick={() => setTab("threads")}>🔗 Threads連携</button>
                <button className={tabButtonClass("next")} onClick={() => setTab("next")}>🧭 次の一手</button>
                <button className={tabButtonClass("knowledge")} onClick={() => setTab("knowledge")}>🧠 ナレッジ</button>
                <button className={tabButtonClass("drafts")} onClick={() => setTab("drafts")}>✨ 投稿生成</button>
              </div>
            </div>
          </header>

          <main className="main">
            {tab === "dashboard" && (
              <div className="stack">
                <div className="grid4">
                  <StatCard icon="📝" tone="purple" label="総投稿数" value={`${posts.length}件`} />
                  <StatCard icon="💫" tone="pink" label="平均EG率" value={`${stats.avgEg}%`} note="いいね＋返信×3＋リポスト×2" />
                  <StatCard icon="🕯️" tone="orange" label="私だけのゴールデンタイム" value={stats.goldenTime.bestLabel} note={`${stats.goldenTime.bestBand} / 信頼度${stats.goldenTime.confidence}%`} />
                  <StatCard icon="💎" tone="green" label="note成果" value={`${stats.totalClicks}クリック / ${stats.totalSales}部`} />
                </div>

                <div className="grid2">
                  <Card>
                    <h2 className="sectionTitle">🕯️ 私だけのゴールデンタイム</h2>
                    <div className="profileBox">
                      <span className="smallLabel">今いちばん強い時間</span>
                      <p className="postText" style={{ fontSize: 22, fontWeight: 820 }}>{stats.goldenTime.bestLabel}台</p>
                      <p className="note">{stats.goldenTime.insight}</p>
                    </div>

                    <div className="stack" style={{ marginTop: 14 }}>
                      {stats.goldenTime.ranking.length ? stats.goldenTime.ranking.map((item, index) => (
                        <div key={item.hour} className="knowledgeItem">
                          <div className="postTop">
                            <div>
                              <strong>#{index + 1} {item.label}台</strong><br />
                              <span className="note">{item.band}・投稿{item.count}件・信頼度{item.confidence}%</span>
                            </div>
                            <span className="egPill">勝ち時間 {item.score}点</span>
                          </div>
                          <ScoreBar score={clamp(item.score, 0, 100)} />
                          <p className="meta">平均EG {item.avgEg}% / 平均導線 {item.avgFunnel}点 / noteクリック {item.clicks} / 購入 {item.sales}</p>
                        </div>
                      )) : <div className="emptyGlow">投稿時間を入れると、勝ち時間ランキングが出ます。</div>}
                    </div>
                  </Card>

                  <Card>
                    <h2 className="sectionTitle">EG率と導線スコアの推移</h2>
                    <ResponsiveContainer width="100%" height={280}>
                      <LineChart data={stats.timeline}>
                        <CartesianGrid strokeDasharray="3 3" />
                        <XAxis dataKey="date" />
                        <YAxis />
                        <Tooltip content={<CustomTooltip />} />
                        <Line type="monotone" dataKey="eg" name="EG率" stroke="#c46a91" strokeWidth={3} dot={{ r: 4 }} />
                        <Line type="monotone" dataKey="funnel" name="導線スコア" stroke="#8f73b8" strokeWidth={3} dot={{ r: 4 }} />
                      </LineChart>
                    </ResponsiveContainer>
                  </Card>
                </div>

                <div className="grid2">
                  <Card>
                    <h2 className="sectionTitle">フック別：導線の強さ</h2>
                    <ResponsiveContainer width="100%" height={260}>
                      <BarChart data={stats.hookData}>
                        <CartesianGrid strokeDasharray="3 3" />
                        <XAxis dataKey="hook" />
                        <YAxis />
                        <Tooltip content={<CustomTooltip />} />
                        <Bar dataKey="funnel" name="導線スコア" fill="#8f73b8" radius={[10, 10, 0, 0]} />
                      </BarChart>
                    </ResponsiveContainer>
                  </Card>

                  <Card>
                    <h2 className="sectionTitle">ふく式診断</h2>
                    <div className="stack">
                      {generateAdvice().map((item, index) => (
                        <div className="advice" key={index}>{item}</div>
                      ))}
                    </div>
                  </Card>
                </div>

                <Card>
                  <h2 className="sectionTitle">導線スコアランキング</h2>
                  <div className="stack">
                    {stats.funnelSorted.map((post, index) => (
                      <div key={post.id} className="postItem">
                        <div className="postTop">
                          <div className="buttonRow">
                            <span className="rank">#{index + 1}</span>
                            <Badge>{post.hookType}</Badge>
                            <Badge>{post.role}</Badge>
                            <Badge>{post.readerPsyche}</Badge>
                          </div>
                          <span className="egPill">導線 {funnelScore(post)}点</span>
                        </div>
                        <ScoreBar score={funnelScore(post)} />
                        <p className="postText" style={{ marginTop: 12 }}>{post.text}</p>
                        <p className="meta">EG {engagementRate(post)}% / noteクリック率 {clickRate(post)}% / note購入率 {salesRate(post)}% / {post.date} {post.time}</p>
                      </div>
                    ))}
                  </div>
                </Card>
              </div>
            )}

            {tab === "input" && (
              <div className="inputGrid">
                <Card>
                  <h2 className="sectionTitle">投稿データを追加</h2>

                  <div className="stack">
                    <label className="switchRow">
                      <input type="checkbox" checked={autoClassify} onChange={(e) => setAutoClassify(e.target.checked)} style={{ width: 18 }} />
                      本文から自動分類する
                    </label>

                    <label>
                      <span className="smallLabel">投稿本文</span>
                      <textarea value={form.text} onChange={(e) => updateText(e.target.value)} placeholder="投稿本文を入れる" />
                    </label>

                    <div className="formGrid">
                      <label><span className="smallLabel">日付</span><input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} /></label>
                      <label><span className="smallLabel">時間</span><input type="time" value={form.time} onChange={(e) => setForm({ ...form, time: e.target.value })} /></label>
                      <label><span className="smallLabel">いいね</span><input type="number" value={form.likes} onChange={(e) => setForm({ ...form, likes: e.target.value })} /></label>
                      <label><span className="smallLabel">返信</span><input type="number" value={form.replies} onChange={(e) => setForm({ ...form, replies: e.target.value })} /></label>
                      <label><span className="smallLabel">リポスト</span><input type="number" value={form.reposts} onChange={(e) => setForm({ ...form, reposts: e.target.value })} /></label>
                      <label><span className="smallLabel">閲覧数</span><input type="number" value={form.views} onChange={(e) => setForm({ ...form, views: e.target.value })} /></label>
                      <label><span className="smallLabel">F増減</span><input type="number" value={form.fc} onChange={(e) => setForm({ ...form, fc: e.target.value })} /></label>
                      <label><span className="smallLabel">noteクリック数</span><input type="number" value={form.noteClicks} onChange={(e) => setForm({ ...form, noteClicks: e.target.value })} /></label>
                      <label><span className="smallLabel">note購入数</span><input type="number" value={form.noteSales} onChange={(e) => setForm({ ...form, noteSales: e.target.value })} /></label>

                      <label>
                        <span className="smallLabel">フックタイプ</span>
                        <select value={form.hookType} onChange={(e) => setForm({ ...form, hookType: e.target.value })}>
                          {HOOK_TYPES.map((hook) => <option key={hook} value={hook}>{hook}</option>)}
                        </select>
                      </label>

                      <label>
                        <span className="smallLabel">投稿の役割</span>
                        <select value={form.role} onChange={(e) => setForm({ ...form, role: e.target.value })}>
                          {POST_ROLES.map((role) => <option key={role} value={role}>{role}</option>)}
                        </select>
                      </label>

                      <label>
                        <span className="smallLabel">読者心理</span>
                        <select value={form.readerPsyche} onChange={(e) => setForm({ ...form, readerPsyche: e.target.value })}>
                          {READER_PSYCHES.map((psyche) => <option key={psyche} value={psyche}>{psyche}</option>)}
                        </select>
                      </label>
                    </div>

                    <div className="buttonRow">
                      <button className="primaryButton" onClick={addPost}>追加する</button>
                      <button className="ghostButton" onClick={() => setPosts(SAMPLE_POSTS)}>サンプルに戻す</button>
                      <button className="dangerButton" onClick={() => setPosts([])}>全削除</button>
                    </div>
                  </div>
                </Card>

                <Card>
                  <h2 className="sectionTitle">入力済み投稿</h2>
                  <div className="stack">
                    {posts.length === 0 ? <div className="emptyGlow">まだ投稿がありません。</div> : null}
                    {posts.map((post) => (
                      <div key={post.id} className="postItem">
                        <div className="postTop">
                          <div className="buttonRow">
                            <Badge>{post.hookType}</Badge>
                            <Badge>{post.role}</Badge>
                            <Badge>{post.readerPsyche}</Badge>
                          </div>
                          <button className="dangerButton" onClick={() => setPosts((prev) => prev.filter((p) => p.id !== post.id))}>削除</button>
                        </div>
                        <p className="postText">{post.text}</p>
                        <p className="meta">EG {engagementRate(post)}% / 導線 {funnelScore(post)}点 / note {post.noteClicks || 0}クリック・{post.noteSales || 0}部</p>
                      </div>
                    ))}
                  </div>
                </Card>
              </div>
            )}

            {tab === "csv" && (
              <div className="grid2">
                <Card>
                  <h2 className="sectionTitle">CSVインポート</h2>
                  <p className="note">ヘッダー例：text,date,time,likes,replies,reposts,views,fc,noteClicks,noteSales</p>
                  <textarea style={{ minHeight: 330, marginTop: 14 }} value={csvText} onChange={(e) => setCsvText(e.target.value)} />
                  <div className="buttonRow" style={{ marginTop: 12 }}>
                    <button className="primaryButton" onClick={importCsv}>CSVを取り込む</button>
                    <button className="ghostButton" onClick={loadSampleCsv}>サンプルCSV</button>
                  </div>
                  {csvMessage ? <div className="advice" style={{ marginTop: 12 }}>{csvMessage}</div> : null}
                </Card>

                <Card>
                  <h2 className="sectionTitle">CSV列の意味</h2>
                  <div className="stack">
                    {["text", "date", "time", "likes", "replies", "reposts", "views", "fc", "noteClicks", "noteSales"].map((col) => (
                      <div className="knowledgeItem" key={col}>
                        <strong>{col}</strong>
                        <p className="note">投稿本文・日時・Threads数値・note成果を入れます。</p>
                      </div>
                    ))}
                  </div>
                </Card>
              </div>
            )}

            {tab === "threads" && (
              <div className="stack">
                <Card>
                  <h2 className="sectionTitle">Threads公式API連携の準備</h2>
                  <p className="note">Reactだけで本番連携はしません。App SecretとAccess Tokenはバックエンドの環境変数に保存します。</p>
                </Card>

                <div className="grid2">
                  <Card>
                    <h2 className="sectionTitle">OAuth設定</h2>
                    <div className="stack">
                      <label>
                        <span className="smallLabel">Threads App ID / Client ID</span>
                        <input value={threadsConfig.clientId} onChange={(e) => setThreadsConfig({ ...threadsConfig, clientId: e.target.value })} placeholder="数字だけのThreads App ID" />
                      </label>

                      <label>
                        <span className="smallLabel">OAuthリダイレクトURL</span>
                        <input value={threadsConfig.redirectUri} onChange={(e) => setThreadsConfig({ ...threadsConfig, redirectUri: e.target.value })} />
                      </label>

                      <label>
                        <span className="smallLabel">バックエンドAPI URL</span>
                        <input value={threadsConfig.backendBaseUrl} onChange={(e) => setThreadsConfig({ ...threadsConfig, backendBaseUrl: e.target.value })} />
                      </label>

                      <div className="copyBox">{threadsAuthUrl || "Client IDとリダイレクトURLを入れると、認可URLがここに出ます。"}</div>

                      <div className="buttonRow">
                        <button className="ghostButton" onClick={() => navigator.clipboard?.writeText(threadsAuthUrl || "")}>認可URLをコピー</button>
                        <button className="primaryButton" onClick={() => threadsAuthUrl && window.open(threadsAuthUrl, "_blank")}>認可URLを開く</button>
                      </div>
                    </div>
                  </Card>

                  <Card>
                    <h2 className="sectionTitle">Threads API風JSONを仮取り込み</h2>
                    <p className="note">実連携前に、バックエンドから返る想定のJSONを貼って分析に入れられます。</p>
                    <textarea style={{ minHeight: 300, marginTop: 14 }} value={threadsJson} onChange={(e) => setThreadsJson(e.target.value)} />
                    <div className="buttonRow" style={{ marginTop: 12 }}>
                      <button className="primaryButton" onClick={importThreadsJson}>JSONを取り込む</button>
                      <button className="ghostButton" onClick={loadThreadsSampleJson}>サンプルJSON</button>
                    </div>
                    {threadsMessage ? <div className="advice" style={{ marginTop: 12 }}>{threadsMessage}</div> : null}
                  </Card>
                </div>
              </div>
            )}

            {tab === "next" && (
              <div className="grid2">
                <Card>
                  <h2 className="sectionTitle">次に出すべき投稿</h2>
                  <div className="profileBox">
                    <span className="smallLabel">おすすめ</span>
                    <p className="postText" style={{ fontWeight: 820 }}>{stats.nextRec.hook} × {stats.nextRec.role} × {stats.nextRec.psyche}</p>
                  </div>
                  <div className="advice" style={{ marginTop: 14 }}>{stats.nextRec.reason}</div>
                  <div className="miniGrid" style={{ marginTop: 14 }}>
                    <StatCard icon="🧭" label="推奨テーマ" value={stats.nextRec.theme} />
                    <StatCard icon="✍️" label="狙う役割" value={stats.nextRec.role} />
                    <StatCard icon="🫧" label="読者心理" value={stats.nextRec.psyche} />
                  </div>
                </Card>

                <Card>
                  <h2 className="sectionTitle">そのまま使える下書き</h2>
                  <div className="copyBox">{makeDraftByRecommendation(stats.nextRec)}</div>
                </Card>
              </div>
            )}

            {tab === "knowledge" && (
              <div className="stack">
                <Card>
                  <h2 className="sectionTitle">読み込み済み：ふく式Threads運用ナレッジ</h2>
                  <p className="postText">{FUKU_KNOWLEDGE.corePosition}</p>
                  <div className="profileBox" style={{ marginTop: 14 }}>
                    <span className="smallLabel">基本メッセージ</span>
                    <p className="postText" style={{ fontWeight: 820 }}>{FUKU_KNOWLEDGE.mainMessage}</p>
                  </div>
                </Card>

                <div className="knowledgeList">
                  <Card>
                    <h2 className="sectionTitle">note導線フレーズ</h2>
                    <div className="stack">
                      {FUKU_KNOWLEDGE.noteBridge.map((item) => <div key={item} className="knowledgeItem">{item}</div>)}
                    </div>
                  </Card>

                  <Card>
                    <h2 className="sectionTitle">避けること</h2>
                    <div className="stack">
                      {FUKU_KNOWLEDGE.avoid.map((item) => <div key={item} className="knowledgeItem">{item}</div>)}
                    </div>
                  </Card>
                </div>
              </div>
            )}

            {tab === "drafts" && (
              <div className="grid2">
                <Card>
                  <h2 className="sectionTitle">ふく式 投稿生成</h2>
                  <p className="note">ナレッジをもとに、共感・情報緊急・導線型のたたき台を出します。</p>
                  <label style={{ display: "block", marginTop: 16 }}>
                    <span className="smallLabel">テーマ</span>
                    <input value={draftTheme} onChange={(e) => setDraftTheme(e.target.value)} />
                  </label>
                </Card>

                <Card>
                  <h2 className="sectionTitle">生成結果</h2>
                  <div className="stack">
                    {generateDrafts().map((draft, index) => (
                      <div key={index} className="copyBox">{draft}</div>
                    ))}
                  </div>
                </Card>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

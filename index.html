      const raw = await res.json();
      const items = Array.isArray(raw) ? raw : Array.isArray(raw?.data) ? raw.data : [];
      const converted = items.map(normalizeThreadsItem).filter(p => p.text);
      if (!converted.length) {
        setSyncStatus("error");
        setThreadsMsg("取り込めるデータがありませんでした。");
        return;

      setPosts(prev => [...converted, ...prev]);
      setThreadsJson(JSON.stringify(raw, null, 2));
      setSyncStatus("success");
      setThreadsMsg(`${converted.length}件を同期しました。noteクリック・購入数は手入力してください。`);
